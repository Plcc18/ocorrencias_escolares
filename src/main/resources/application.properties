spring.application.name=ocorrencias-escolares-api

# =====================
# Banco de Dados
# =====================
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/ocorrencias_escolares_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:123}
spring.datasource.driver-class-name=org.postgresql.Driver

# =====================
# JPA / Hibernate
# =====================
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# =====================
# Flyway
# =====================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# =====================
# JWT
# =====================
jwt.secret=${JWT_SECRET:rN3yV5sT9hG8fQ1kL2bM6xJ0pW4zD7uR3vA1tB8qY6nE5cV2jF9mH0sK7lO4dP8a}
jwt.expiration-ms=86400000
jwt.refresh-expiration-ms=604800000

# =====================
# CORS
# =====================
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:4200,http://localhost:5173}

# =====================
# Swagger / OpenAPI
# =====================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# =====================
# Profile ativo
# =====================
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}